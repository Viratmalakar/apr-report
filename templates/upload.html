<!DOCTYPE html>
<html>
<head>

<title>Agent Performance Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>

<h1 class="animated-header">Agent Performance Dashboard</h1>


<form action="/dashboard" method="POST" enctype="multipart/form-data">

<div class="upload-box">

<div class="file-box">

<h3>APR Report</h3>

<input type="file" name="agent_file" required>

</div>


<div class="file-box">

<h3>CDR Report</h3>

<input type="file" name="cdr_file" required>

</div>


<button id="generateBtn" type="submit">

Generate Report

</button>


<div id="processing" class="processing" style="display:none">

⚡ Processing Live...

</div>

</div>

</form>



<script>

document.querySelector("form").addEventListener("submit",function(){

document.getElementById("generateBtn").innerText="Processing..."

document.getElementById("processing").style.display="block"

})

</script>


</body>

</html>
