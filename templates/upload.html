<!DOCTYPE html>
<html>
<head>
    <title>Upload Reports</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg">

<div class="upload-wrapper">
    <div class="upload-box">
        <h2>Agent Performance Dashboard</h2>

        <form action="/dashboard" method="post" enctype="multipart/form-data">

            <div class="file-group">
                <label>Upload Agent Performance Report</label>
                <input type="file" name="agent_file" onchange="showName(this,'agentName')" required>
                <p id="agentName" class="file-name"></p>
            </div>

            <div class="file-group">
                <label>Upload CDR Report</label>
                <input type="file" name="cdr_file" onchange="showName(this,'cdrName')" required>
                <p id="cdrName" class="file-name"></p>
            </div>

            <button type="submit">Generate Dashboard</button>

        </form>
    </div>
</div>

<script>
function showName(input, id){
    document.getElementById(id).innerText = input.files[0].name;
}
</script>

</body>
</html>
