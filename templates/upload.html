<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="animated-header shine-text">
    Agent Performance Dashboard
</div>

<div class="upload-wrapper">

    <form action="/dashboard" method="POST" enctype="multipart/form-data"
          class="upload-box" id="uploadForm">

        <h2>APR Report</h2>
        <input type="file" name="agent_file" required>

        <h2>CDR Report</h2>
        <input type="file" name="cdr_file" required>

        <button type="submit" class="generate-btn">
            Generate Dashboard
        </button>

    </form>

</div>

<!-- LOADER -->
<div class="processing-overlay" id="processingOverlay">
    <div class="loader-box">
        <div class="gold-spinner"></div>
        <p class="loading-text">Processing Reports...</p>
    </div>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(){
    document.getElementById("processingOverlay").style.display = "flex";
});
</script>

</body>
</html>
