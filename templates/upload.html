<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg">

<div class="upload-wrapper">
    <div class="upload-box">

        <h2>Agent Performance Dashboard</h2>

        <form id="uploadForm" action="/dashboard" method="post" enctype="multipart/form-data">

            <div class="file-group">
                <h3>APR Report</h3>
                <label class="upload-label">
                    Upload File
                    <input type="file" name="agent_file" required>
                </label>
            </div>

            <div class="file-group">
                <h3>CDR Report</h3>
                <label class="upload-label">
                    Upload File
                    <input type="file" name="cdr_file" required>
                </label>
            </div>

            <button type="submit" class="main-btn">Generate Dashboard</button>

        </form>

    </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay">
    <div class="loader-box">
        <div class="spinner"></div>
        <p class="loading-text">Processing Reports<span class="dots"></span></p>
    </div>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(){
    document.getElementById("loadingOverlay").style.display = "flex";
});
</script>

</body>
</html>
