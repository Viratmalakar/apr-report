<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="animated-header shine-text">
    Agent Performance Dashboard
</div>

<div class="upload-wrapper">

    <form action="/dashboard" method="POST" enctype="multipart/form-data"
          class="upload-box" id="uploadForm">

        <h2>APR Report</h2>
        <input type="file" name="agent_file" required>

        <h2>CDR Report</h2>
        <input type="file" name="cdr_file" required>

        <button type="submit" class="generate-btn">
            Generate Dashboard
        </button>

    </form>

</div>

<!-- PROCESSING OVERLAY -->
<div class="processing-overlay" id="processingOverlay">
    <div class="loader-box">
        <div class="gold-spinner"></div>
        <p class="loading-text">Processing Reports...</p>
    </div>
</div>

<script>
const form = document.getElementById("uploadForm");

form.addEventListener("submit", function(e) {

    e.preventDefault(); // stop immediate submit

    const overlay = document.getElementById("processingOverlay");
    overlay.style.display = "flex";

    // slight delay so loader actually renders
    setTimeout(() => {
        form.submit();
    }, 200);

});
</script>

</body>
</html>
