<!DOCTYPE html>
<html>
<head>
    <title>Upload Reports</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="animated-header">Agent Performance Dashboard</div>

<form action="/dashboard" method="POST" enctype="multipart/form-data"
      class="upload-box" id="uploadForm">

    <h3>APR Report</h3>
    <input type="file" name="agent_file" required>

    <h3>CDR Report</h3>
    <input type="file" name="cdr_file" required>

    <br><br>
    <button type="submit">Generate Dashboard</button>
</form>

<div class="loader" id="loader" style="display:none;">
    <span></span>
</div>

<script src="/static/script.js"></script>

</body>
</html>
