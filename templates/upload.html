<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="animated-header shine-text">
    Agent Performance Dashboard
</div>

<div class="upload-wrapper">

    <form action="/dashboard" method="POST" enctype="multipart/form-data"
          class="upload-box" id="uploadForm">

        <!-- APR BOX -->
        <div class="file-section">
            <h2>APR Report</h2>
            <input type="file" name="agent_file" required>
        </div>

        <!-- CDR BOX -->
        <div class="file-section">
            <h2>CDR Report</h2>
            <input type="file" name="cdr_file" required>
        </div>

        <!-- Generate Button -->
        <button type="submit" class="generate-btn">
            Generate Dashboard
        </button>

        <!-- Live Processing Icon -->
        <div class="live-processing" id="liveProcessing">
            <div class="live-dot"></div>
            <span>Processing...</span>
        </div>

    </form>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(){
    document.getElementById("liveProcessing").style.display = "flex";
});
</script>

</body>
</html>
